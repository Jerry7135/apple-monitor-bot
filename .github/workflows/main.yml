name: Apple Refurbished Monitor

on:
  schedule:
    # 這裡設定每 30 分鐘跑一次 (注意：GitHub Actions 的 cron 是 UTC 時間)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 讓你可以手動點擊按鈕立即測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製儲存庫內容
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install -r requirements.txt

      - name: 執行巡邏程式
        env:
          # 在這裡把 GitHub 的 Secret 對應給程式
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        run: python apple_monitor_actions.py
