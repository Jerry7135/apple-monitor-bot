name: Apple Refurbished Monitor

on:
  schedule:
    - cron: '8,18,28,38,48,58 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 升級到最新的 v4

      - name: Setup Python
        uses: actions/setup-python@v5 # 升級到最新的 v5
        with:
          python-version: '3.10' # 升級到你熟悉的 3.10

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Monitor Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        run: python apple_monitor_actions.py
